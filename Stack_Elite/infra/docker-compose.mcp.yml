version: "3.8"

# ==========================================
# ELITE SDR — INTERNAL MCP SERVERS
# Servidores MCP internos que expõem ferramentas tipadas ao agente via SSE.
# Cada servidor é um módulo de responsabilidade única.
#
# Pré-requisito: docker-compose.core.yml deve estar UP.
# Comando: docker-compose -f docker-compose.mcp.yml up -d
#
# Portas SSE (para configurar no n8n como "MCP Client"):
#   mcp_chatwoot  → http://elite_mcp_chatwoot:8787
#   mcp_fipe      → http://elite_mcp_fipe:8787
#   mcp_stock     → http://elite_mcp_stock:8787
#   mcp_scoring   → http://elite_mcp_scoring:8787
#   mcp_media     → http://elite_mcp_media:8787
#   mcp_analytics → http://elite_mcp_analytics:8787
#   mcp_scheduling→ http://elite_mcp_scheduling:8787
# ==========================================

x-mcp-base: &mcp-base
  build:
    context: ../mcp-servers
    dockerfile: Dockerfile
  restart: unless-stopped
  environment:
    - MCP_TRANSPORT=sse
    - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@elite_postgres:5432/${POSTGRES_DB}
  networks:
    - elite_network
  healthcheck:
    test: ["CMD", "wget", "-qO-", "http://localhost:8787/sse"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 15s

services:
  # ── Chatwoot MCP: Controle de Conversas ──────────────────────────────────
  elite_mcp_chatwoot:
    <<: *mcp-base
    command: npm run dev:chatwoot
    container_name: elite_mcp_chatwoot
    ports:
      - "127.0.0.1:8787:8787" # Apenas localhost — acesso externo via Traefik
    environment:
      - CHATWOOT_URL=${CHATWOOT_URL}
      - CHATWOOT_API_KEY=${CHATWOOT_API_KEY}
      - CHATWOOT_ACCOUNT_ID=${CHATWOOT_ACCOUNT_ID}
      - MCP_TRANSPORT=sse
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@elite_postgres:5432/${POSTGRES_DB}
    deploy:
      resources:
        limits:
          memory: 256M

  # ── FIPE MCP: Preços e Estratégia de Pricing ─────────────────────────────
  elite_mcp_fipe:
    <<: *mcp-base
    command: npm run dev:fipe
    container_name: elite_mcp_fipe
    ports:
      - "127.0.0.1:8788:8787"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Stock MCP: Busca Semântica de Inventário ───────────────────────────────
  elite_mcp_stock:
    <<: *mcp-base
    command: npm run dev:stock
    container_name: elite_mcp_stock
    ports:
      - "127.0.0.1:8789:8787"
    environment:
      - MCP_TRANSPORT=sse
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@elite_postgres:5432/${POSTGRES_DB}
      - RAG_SERVICE_URL=http://ai_rag:8000
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Scoring MCP: BANT, Classificação e Handoff ─────────────────────────────
  elite_mcp_scoring:
    <<: *mcp-base
    command: npm run dev:scoring
    container_name: elite_mcp_scoring
    ports:
      - "127.0.0.1:8790:8787"
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Media MCP: Whisper (Áudio) + LLaVA (Imagem) ───────────────────────────
  elite_mcp_media:
    <<: *mcp-base
    command: npm run dev:whisper-llava
    container_name: elite_mcp_media
    ports:
      - "127.0.0.1:8791:8787"
    environment:
      - MCP_TRANSPORT=sse
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@elite_postgres:5432/${POSTGRES_DB}
      - WHISPER_URL=http://ai_whisper:9000
      - LLAVA_URL=http://ai_llava:8000
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Analytics MCP: Relatórios e Análise com Gemini ────────────────────────
  elite_mcp_analytics:
    <<: *mcp-base
    command: npm run dev:analytics
    container_name: elite_mcp_analytics
    ports:
      - "127.0.0.1:8792:8787"
    environment:
      - MCP_TRANSPORT=sse
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@elite_postgres:5432/${POSTGRES_DB}
      - LANGFUSE_HOST=http://elite_langfuse:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Scheduling MCP: Google Calendar + Maps ────────────────────────────────
  elite_mcp_scheduling:
    <<: *mcp-base
    command: npm run dev:scheduling
    container_name: elite_mcp_scheduling
    ports:
      - "127.0.0.1:8793:8787"
    environment:
      - MCP_TRANSPORT=sse
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@elite_postgres:5432/${POSTGRES_DB}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  elite_network:
    external: true
    name: elite_network
